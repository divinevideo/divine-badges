name = "divine-badges"
main = "build/worker/shim.mjs"
compatibility_date = "2026-04-13"

[build]
command = "worker-build --release"

[triggers]
crons = ["5 * * * *"]

[vars]
DIVINE_API_BASE_URL = "https://api.divine.video"
DIVINE_RELAY_URL = "wss://relay.divine.video"
DIVINE_BADGE_IMAGE_URL = "https://divine.video/og.png"
DIVINE_CREATOR_BASE_URL = "https://divine.video/u"

[[d1_databases]]
binding = "DB"
database_name = "divine-badges"
database_id = "03a9fc2b-698b-48fb-87a5-7a0a615cae91"
preview_database_id = "03a9fc2b-698b-48fb-87a5-7a0a615cae91"
