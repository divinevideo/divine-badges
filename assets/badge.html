<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Badge · Divine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root{--green:#27C58B;--dark:#07241B;--mint:#D0FBCB;--off:#F9F7F6;--yellow:#FFF140;--pink:#FF7FAF;--orange:#FF7640;--violet:#A3A9FF;color-scheme:dark}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:
      radial-gradient(circle at 110% 15%, rgba(39,197,139,.34), transparent 22%),
      radial-gradient(circle at -10% 72%, rgba(255,118,64,.16), transparent 24%),
      linear-gradient(180deg, #08241b 0%, #0b2a1e 100%);
      color:var(--off);font-family:'Inter',system-ui,sans-serif;font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:inherit;text-decoration:none}
    button,input,textarea{font:inherit}
    .shell{max-width:1120px;margin:0 auto;padding:0 clamp(20px,4vw,40px)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:24px 0;gap:16px;flex-wrap:wrap}
    .brand{display:inline-flex;align-items:center;gap:12px;color:var(--off);font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.3rem}
    .logomark{width:26px;height:26px;border-radius:50%;background:var(--green);border:2px solid var(--off);position:relative;display:inline-block}
    .logomark::after{content:"";position:absolute;inset:5px;background:var(--dark);border-radius:50%}
    .nav-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
    .back{font-size:.88rem;color:var(--mint);border-bottom:1.5px solid rgba(208,251,203,.4);padding-bottom:1px}
    .back:hover{color:var(--green);border-bottom-color:var(--green)}
    .auth-chip{display:inline-flex;align-items:center;gap:10px;min-height:44px;padding:8px 14px;border-radius:999px;border:2px solid rgba(208,251,203,.22);background:rgba(208,251,203,.04);color:var(--off);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;line-height:1;cursor:pointer}
    .auth-chip:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--green)}
    .auth-chip .avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:var(--green);color:var(--dark);border:1.5px solid rgba(7,36,27,.8);font-size:.92rem;font-weight:800;flex-shrink:0}
    .auth-chip .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .hero{padding:32px 0 28px}
    .hero h1{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;font-size:clamp(2.8rem,7vw,4.8rem);letter-spacing:-.04em;line-height:.92}
    .hero h1 .punct{color:var(--green)}
    .lede{max-width:58ch;margin-top:16px;color:var(--mint);font-size:1.05rem;line-height:1.5}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque',sans-serif;font-size:.92rem;font-weight:700;color:var(--mint);text-transform:none;letter-spacing:.01em;margin-bottom:14px}
    .eyebrow::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--green)}
    .page{display:grid;gap:22px;padding-bottom:44px}
    .hero-card{position:relative;overflow:hidden;display:grid;grid-template-columns:minmax(0,1.2fr) 220px;gap:28px;padding:30px;border-radius:30px;background:linear-gradient(135deg, rgba(249,247,246,.98), rgba(239,255,245,.96));color:var(--dark);border:2px solid rgba(7,36,27,.86);box-shadow:10px 10px 0 rgba(39,197,139,.78)}
    .hero-card::after{content:"";position:absolute;inset:auto -48px -48px auto;width:180px;height:180px;border-radius:50%;background:rgba(39,197,139,.14)}
    .hero-copy{position:relative;z-index:1;display:grid;gap:16px;align-content:start}
    .hero-copy h2{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;font-size:clamp(2.2rem,5vw,3.6rem);letter-spacing:-.04em;line-height:.9;max-width:10ch}
    .hero-copy p{max-width:44ch;font-size:1rem;color:rgba(7,36,27,.8)}
    .meta-row{display:flex;flex-wrap:wrap;gap:10px}
    .meta-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:rgba(7,36,27,.08);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.92rem}
    .medal{position:relative;z-index:1;display:grid;place-items:center;align-self:center;justify-self:end;width:min(220px,100%);aspect-ratio:1;border-radius:36px;background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.7), transparent 30%), linear-gradient(145deg, var(--yellow), #ffdd6a 35%, #ffb66d 100%);border:2px solid rgba(7,36,27,.88);box-shadow:0 18px 32px rgba(7,36,27,.18), 10px 10px 0 rgba(7,36,27,.1)}
    .medal.week{background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.6), transparent 30%), linear-gradient(145deg, #fff0a2, #ffc86e 52%, #ff7fa0 100%)}
    .medal.month{background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.52), transparent 30%), linear-gradient(145deg, #ffe3f1, #ff9cc0 45%, #9a8aff 100%)}
    .medal img{width:100%;height:100%;object-fit:cover;border-radius:34px}
    .medal-letter{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;font-size:5rem;line-height:1;color:rgba(7,36,27,.9);text-shadow:0 1px 0 rgba(255,255,255,.5)}
    .layout{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(280px,.92fr);gap:22px;align-items:start}
    .section{background:rgba(208,251,203,.05);border:1px solid rgba(208,251,203,.14);border-radius:24px;padding:22px}
    .section h3{font-family:'Bricolage Grotesque','Inter',sans-serif;font-size:1.55rem;font-weight:800;letter-spacing:-.03em;line-height:.95;margin-bottom:6px}
    .section p.kicker{font-size:.95rem;color:rgba(208,251,203,.78);margin-bottom:16px}
    .awardee-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .awardee-card{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;padding:14px 16px;border-radius:18px;background:rgba(249,247,246,.96);color:var(--dark);border:2px solid rgba(7,36,27,.86);box-shadow:6px 6px 0 rgba(39,197,139,.24)}
    .awardee-avatar{width:52px;height:52px;border-radius:50%;overflow:hidden;background:var(--green);display:grid;place-items:center;border:2px solid rgba(7,36,27,.88);font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;font-size:1.1rem;color:var(--dark)}
    .awardee-avatar img{width:100%;height:100%;object-fit:cover}
    .awardee-name{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;font-size:1.2rem;line-height:1}
    .awardee-sub{font-size:.88rem;color:rgba(7,36,27,.66);margin-top:4px}
    .technical{border-radius:18px;background:rgba(208,251,203,.05);border:1px solid rgba(208,251,203,.14);overflow:hidden}
    .technical summary{list-style:none;cursor:pointer;padding:14px 16px;font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700;font-size:1rem;color:var(--mint)}
    .technical summary::-webkit-details-marker{display:none}
    .technical summary::after{content:"+";float:right;color:var(--green);font-size:1.2rem;line-height:1}
    .technical[open] summary::after{content:"−"}
    .technical-body{padding:0 16px 16px}
    .details-list{display:grid;gap:14px}
    .detail-row{display:grid;gap:4px;padding:12px 0;border-top:1px solid rgba(208,251,203,.12)}
    .detail-row:first-child{border-top:0;padding-top:0}
    .detail-label{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700;font-size:.92rem;color:var(--mint)}
    .detail-value{font-size:.95rem;color:var(--off);word-break:break-word}
    .detail-value code{font-family:'SFMono-Regular',ui-monospace,monospace;font-size:.82rem;color:var(--mint)}
    .owner-note{padding:14px 16px;border-radius:18px;background:rgba(208,251,203,.06);border:1px solid rgba(208,251,203,.15);color:rgba(208,251,203,.84);font-size:.95rem}
    .owner-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
    .edit-badge-link{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;border:1.5px solid rgba(208,251,203,.36);background:rgba(208,251,203,.06);color:var(--mint);font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700;font-size:.9rem}
    .edit-badge-link:hover{background:rgba(208,251,203,.14);color:var(--off)}
    .collection-state{display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:14px 18px;border-radius:18px;font-size:.98rem}
    .collection-state strong{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700}
    .collection-state.collected{background:rgba(39,197,139,.12);border:1px solid rgba(39,197,139,.38);color:var(--mint)}
    .collection-state.awarded{background:rgba(255,241,64,.12);border:1px solid rgba(255,241,64,.36);color:var(--yellow)}
    .collection-state.none{background:rgba(208,251,203,.06);border:1px solid rgba(208,251,203,.15);color:rgba(208,251,203,.78)}
    .award-panel{border-radius:22px;background:rgba(208,251,203,.05);border:1px solid rgba(208,251,203,.14);overflow:hidden}
    .award-panel summary{list-style:none;cursor:pointer;padding:16px 18px;font-family:'Bricolage Grotesque','Inter',sans-serif;font-size:1.18rem;font-weight:800;letter-spacing:-.02em}
    .award-panel summary::-webkit-details-marker{display:none}
    .award-panel summary::after{content:"+";float:right;color:var(--green);font-size:1.2rem;line-height:1}
    .award-panel[open] summary::after{content:"−"}
    .award-panel-body{padding:0 18px 18px;display:grid;gap:14px}
    .inline-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end}
    .inline-field,.stack-field{display:grid;gap:8px}
    .inline-field span,.stack-field span,.result-title{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700;font-size:.95rem;color:var(--mint)}
    .inline-field input,.stack-field textarea{width:100%;padding:14px 16px;border-radius:16px;border:2px solid rgba(208,251,203,.18);background:rgba(7,36,27,.72);color:var(--off)}
    .stack-field textarea{min-height:136px}
    .inline-field input:focus,.stack-field textarea:focus{outline:none;box-shadow:4px 4px 0 rgba(39,197,139,.45)}
    .secondary,.primary{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700;font-size:1rem;padding:10px 18px;border-radius:14px;border:2px solid rgba(7,36,27,.92);cursor:pointer}
    .primary{background:var(--green);color:var(--dark)}
    .secondary{background:rgba(249,247,246,.95);color:var(--dark)}
    .secondary:disabled,.primary:disabled{opacity:.6;cursor:not-allowed}
    .action-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .primary:hover,.secondary:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 rgba(249,247,246,.16)}
    .helper-copy{color:rgba(208,251,203,.72);font-size:.92rem}
    .recipient-results{display:grid;gap:12px}
    .result-block{display:grid;gap:10px}
    .resolved-list{display:grid;gap:10px}
    .resolved-recipient{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;padding:12px 14px;border-radius:16px;background:rgba(249,247,246,.96);color:var(--dark);border:2px solid rgba(7,36,27,.86)}
    .awardee-avatar.small{width:42px;height:42px;font-size:1rem}
    .awardee-name.compact{font-size:1rem}
    .invalid-list{display:flex;gap:8px;flex-wrap:wrap}
    .invalid-pill{display:inline-flex;align-items:center;padding:8px 10px;border-radius:999px;background:rgba(255,127,175,.14);border:1px solid rgba(255,127,175,.35);color:var(--pink);font-size:.88rem}
    .empty{padding:32px 24px;text-align:center;border:2px dashed rgba(208,251,203,.24);color:var(--mint);border-radius:22px;font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:1.08rem}
    .empty.compact{padding:18px 16px;font-size:.95rem}
    .status{margin-top:14px;padding:12px 16px;border-radius:14px;font-size:.92rem;line-height:1.4}
    .status.err{background:rgba(255,127,175,.14);color:var(--pink);border:1px solid rgba(255,127,175,.5)}
    .status.info{background:rgba(208,251,203,.08);color:var(--mint);border:1px solid rgba(208,251,203,.25)}
    .foot{padding:56px 0 40px;color:var(--mint);font-size:.95rem;border-top:2px solid rgba(208,251,203,.14);margin-top:48px}
    @media (max-width:900px){
      .hero-card{grid-template-columns:1fr;gap:22px}
      .medal{justify-self:start;width:180px}
      .layout{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .shell{padding:0 20px}
      .nav-actions{width:100%;justify-content:space-between}
      .hero-card{padding:24px}
      .hero-copy h2{max-width:none}
      .inline-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a class="brand" href="/"><span class="logomark" aria-hidden="true"></span><span>Divine Badges</span></a>
      <div class="nav-actions">
        <a class="back" href="/">← All winners</a>
        <button class="auth-chip" id="auth-chip" type="button">Log in</button>
      </div>
    </nav>
    <section class="hero">
      <h1>Badge details<span class="punct">.</span></h1>
      <p class="lede">Public badge metadata, award history, and owner-only awarding controls.</p>
    </section>
    <section id="view"></section>
    <footer class="foot">
      <p>Built at <a href="https://divine.video">divine.video</a>. Open source. Own what you make.</p>
    </footer>
  </main>
  <script type="module">
    import { mountBadgePage } from "/app/views/badge.js?v=2026-04-20-1";

    mountBadgePage();
  </script>
</body>
</html>
