<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create Badge · Divine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root{--green:#27C58B;--dark:#07241B;--mint:#D0FBCB;--off:#F9F7F6;--pink:#FF7FAF;--orange:#FF7640;color-scheme:dark}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:
      radial-gradient(circle at 108% 10%, rgba(39,197,139,.28), transparent 22%),
      radial-gradient(circle at -12% 74%, rgba(255,118,64,.12), transparent 24%),
      linear-gradient(180deg,#08241b 0%,#0b2a1e 100%);
      color:var(--off);font-family:'Inter',system-ui,sans-serif;font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .shell{max-width:1180px;margin:0 auto;padding:0 clamp(20px,4vw,40px)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:24px 0;gap:16px;flex-wrap:wrap}
    .brand{display:inline-flex;align-items:center;gap:12px;color:var(--off);font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.3rem}
    .logomark{width:26px;height:26px;border-radius:50%;background:var(--green);border:2px solid var(--off);position:relative;display:inline-block}
    .logomark::after{content:"";position:absolute;inset:5px;background:var(--dark);border-radius:50%}
    .nav-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
    .back{font-size:.88rem;color:var(--mint);border-bottom:1.5px solid rgba(208,251,203,.4);padding-bottom:1px}
    .auth-chip{display:inline-flex;align-items:center;gap:10px;min-height:44px;padding:8px 14px;border-radius:999px;border:2px solid rgba(208,251,203,.22);background:rgba(208,251,203,.04);color:var(--off);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;line-height:1;cursor:pointer}
    .auth-chip .avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:var(--green);color:var(--dark);border:1.5px solid rgba(7,36,27,.8);font-size:.92rem;font-weight:800;flex-shrink:0}
    .auth-chip .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .hero{padding:32px 0 24px}
    .hero h1{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:800;font-size:clamp(2.8rem,7vw,4.8rem);letter-spacing:-.04em;line-height:.92}
    .hero h1 .punct{color:var(--green)}
    .lede{max-width:62ch;margin-top:16px;color:var(--mint);font-size:1.05rem;line-height:1.5}
    .studio-grid{display:grid;grid-template-columns:minmax(320px,1.05fr) minmax(360px,1.2fr);gap:18px;align-items:start}
    .panel{padding:26px;border-radius:28px;border:2px solid rgba(7,36,27,.88)}
    .studio-preview{background:linear-gradient(135deg, rgba(249,247,246,.98), rgba(239,255,245,.96));color:var(--dark);box-shadow:10px 10px 0 rgba(39,197,139,.72)}
    .studio-form{background:rgba(208,251,203,.06);backdrop-filter:blur(10px);border-color:rgba(208,251,203,.18)}
    .logged-out-panel{background:rgba(208,251,203,.06);border-color:rgba(208,251,203,.18)}
    .panel-kicker{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.92rem;color:rgba(7,36,27,.6);display:inline-flex;align-items:center;gap:8px}
    .panel-kicker::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--green)}
    .studio-form .panel-kicker,.logged-out-panel .panel-kicker{color:var(--mint)}
    .logged-out-panel .panel-kicker::before,.studio-form .panel-kicker::before{background:var(--green)}
    .logged-out-panel h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-.03em;margin-top:12px}
    .logged-out-panel p{margin-top:10px;color:var(--mint);max-width:48ch}
    .badge-stage{display:grid;gap:18px;margin-top:18px}
    .badge-art{aspect-ratio:1/1;border-radius:26px;border:2px solid rgba(7,36,27,.88);background:rgba(7,36,27,.08);display:grid;place-items:center;overflow:hidden}
    .badge-art.has-art{background:#dafbe2}
    .badge-art img{width:100%;height:100%;object-fit:cover}
    .badge-art-placeholder{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem;color:rgba(7,36,27,.5)}
    .preview-copy{display:grid;gap:8px}
    .preview-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.04em;line-height:.92}
    .preview-id{font-size:.92rem;color:rgba(7,36,27,.62)}
    .preview-description{color:rgba(7,36,27,.8);max-width:40ch}
    .thumb-preview-row{display:grid;gap:10px;margin-top:18px}
    .thumb-preview-label{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.92rem;color:rgba(7,36,27,.64)}
    .thumb-preview{min-height:92px;border-radius:20px;border:2px dashed rgba(7,36,27,.18);display:grid;place-items:center;background:rgba(7,36,27,.03);padding:12px;text-align:center;color:rgba(7,36,27,.52)}
    .thumb-preview.has-thumb{border-style:solid;background:#dafbe2;overflow:hidden}
    .thumb-preview img{width:100%;height:100%;max-height:168px;object-fit:cover;border-radius:14px}
    .field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
    .field{display:grid;gap:8px}
    .field-full{grid-column:1/-1}
    .field span{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;color:var(--mint)}
    input,textarea{width:100%;padding:14px 16px;border-radius:18px;border:2px solid rgba(208,251,203,.18);background:rgba(249,247,246,.96);color:var(--dark);font-family:'Inter',sans-serif;font-size:1rem}
    textarea{min-height:140px;resize:vertical}
    .upload-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
    .upload-card{display:grid;gap:10px;padding:18px;border-radius:22px;border:2px solid rgba(208,251,203,.16);background:rgba(249,247,246,.08)}
    .upload-label,.toggle-row span{font-family:'Bricolage Grotesque',sans-serif;font-weight:700}
    .toggle-row{display:flex;align-items:center;gap:10px}
    .toggle-row input{width:auto}
    .thumb-upload{display:grid;gap:10px}
    .upload-help{font-size:.9rem;color:rgba(208,251,203,.72)}
    .publish-bar{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-top:22px;padding-top:20px;border-top:1px solid rgba(208,251,203,.16)}
    .publish-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.2rem}
    .publish-copy{max-width:38ch;color:var(--mint);font-size:.95rem;margin-top:6px}
    .publisher-line{margin-top:10px;font-size:.9rem;color:var(--mint);display:flex;gap:8px;flex-wrap:wrap}
    button{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;padding:12px 18px;background:var(--green);color:var(--dark);border:2px solid rgba(7,36,27,.88);border-radius:14px;cursor:pointer}
    button:disabled{opacity:.65;cursor:progress}
    .status{margin-top:14px;padding:12px 16px;border-radius:14px;font-size:.92rem;line-height:1.4}
    .status.err{background:rgba(255,127,175,.14);color:var(--pink);border:1px solid rgba(255,127,175,.5)}
    .status.info{background:rgba(208,251,203,.08);color:var(--mint);border:1px solid rgba(208,251,203,.25)}
    .foot{padding:56px 0 40px;color:var(--mint);font-size:.95rem;border-top:2px solid rgba(208,251,203,.14);margin-top:48px}
    @media (max-width:920px){
      .studio-grid{grid-template-columns:1fr}
      .upload-grid{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .field-grid{grid-template-columns:1fr}
      .publish-bar{flex-direction:column;align-items:stretch}
      .nav-actions{width:100%;justify-content:space-between}
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a class="brand" href="/"><span class="logomark" aria-hidden="true"></span><span>Divine Badges</span></a>
      <div class="nav-actions">
        <a class="back" href="/">← All winners</a>
        <button class="auth-chip" id="auth-chip" type="button">Log in</button>
      </div>
    </nav>
    <section class="hero">
      <h1>Create your badge<span class="punct">.</span></h1>
      <p class="lede">Define the badge once, upload its artwork to Divine Blossom, then jump straight into awarding it from the public badge page.</p>
    </section>
    <section id="view"></section>
    <footer class="foot">
      <p>Built at <a href="https://divine.video">divine.video</a>. Open source. Own what you make.</p>
    </footer>
  </main>
  <script type="module">
    import { mountNewBadgePage } from "/app/views/new.js?v=2026-04-16-1";

    mountNewBadgePage();
  </script>
</body>
</html>
