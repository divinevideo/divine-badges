<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Signing you in · Divine Badges</title>
  <meta name="robots" content="noindex">
  <style>
    :root{--green:#27C58B;--dark:#07241B;--mint:#D0FBCB;--off:#F9F7F6;--pink:#FF7FAF;color-scheme:dark}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--dark);color:var(--off);font-family:'Inter',system-ui,sans-serif;font-size:17px;line-height:1.55}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}
    .panel{text-align:center;display:grid;gap:14px;justify-items:center}
    .logomark{width:34px;height:34px;border-radius:50%;background:var(--green);border:2px solid var(--off);position:relative}
    .logomark::after{content:"";position:absolute;inset:7px;background:var(--dark);border-radius:50%}
    #msg{color:var(--mint)}
    #msg.err{color:var(--pink)}
    a{color:var(--off);border-bottom:1.5px solid rgba(249,247,246,.35);padding-bottom:1px;text-decoration:none}
    a:hover{color:var(--green);border-bottom-color:var(--green)}
  </style>
</head>
<body>
  <main>
    <div class="panel">
      <span class="logomark" aria-hidden="true"></span>
      <p id="msg">Signing you in…</p>
      <p id="retry" hidden><a href="/me">Back to your badges</a></p>
    </div>
  </main>
  <script type="module">
    import { completeOAuthCallback } from "/app/auth/session.js?v=2026-07-03-1";

    const message = document.getElementById("msg");
    try {
      const target = await completeOAuthCallback();
      window.location.replace(target);
    } catch (error) {
      message.className = "err";
      message.textContent = `Login failed: ${error.message || error}`;
      document.getElementById("retry").hidden = false;
    }
  </script>
</body>
</html>
